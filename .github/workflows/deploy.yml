name: Test and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - run: black --check .
      - run: flake8 app tests main.py
      - run: pytest --cov=app --cov=main --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy backend to AWS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker build -t "$ECR_REGISTRY/job-tracker-backend:${{ github.sha }}" .
          docker tag "$ECR_REGISTRY/job-tracker-backend:${{ github.sha }}" "$ECR_REGISTRY/job-tracker-backend:latest"
          docker push "$ECR_REGISTRY/job-tracker-backend:${{ github.sha }}"
          docker push "$ECR_REGISTRY/job-tracker-backend:latest"

      - name: Deploy backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker pull ${{ secrets.ECR_REGISTRY }}/job-tracker-backend:latest

            docker run --rm \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              -e ENVIRONMENT=production \
              -e DEBUG=False \
              -e SECRET_KEY='${{ secrets.SECRET_KEY }}' \
              ${{ secrets.ECR_REGISTRY }}/job-tracker-backend:latest \
              alembic upgrade head

            docker stop job-tracker-backend || true
            docker rm job-tracker-backend || true
            docker run -d --name job-tracker-backend --restart unless-stopped \
              -p 80:8000 \
              -e DATABASE_URL='${{ secrets.DATABASE_URL }}' \
              -e ENVIRONMENT=production \
              -e DEBUG=False \
              -e SECRET_KEY='${{ secrets.SECRET_KEY }}' \
              -e ACCESS_TOKEN_EXPIRE_MINUTES=1440 \
              -e ALLOWED_ORIGINS='${{ secrets.API_ALLOWED_ORIGINS }}' \
              ${{ secrets.ECR_REGISTRY }}/job-tracker-backend:latest
            sleep 10
            curl -fsS http://localhost/api/health
