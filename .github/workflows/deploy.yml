name: Test and Deploy

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'README.md'
      - 'SETUP.md'
      - 'SYSTEM_DESIGN.md'
      - 'infra/scheduler/**'
      - '.github/workflows/seed-demo.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt
      - run: black --check .
      - run: flake8 app tests main.py
      - run: pytest --cov=app --cov=main --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker build -t "$ECR_REGISTRY/job-tracker-backend:${{ github.sha }}" .
          docker tag "$ECR_REGISTRY/job-tracker-backend:${{ github.sha }}" "$ECR_REGISTRY/job-tracker-backend:latest"
          docker push "$ECR_REGISTRY/job-tracker-backend:${{ github.sha }}"
          docker push "$ECR_REGISTRY/job-tracker-backend:latest"

      - name: Deploy backend on EC2 with SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.API_ALLOWED_ORIGINS }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REDIRECT_URI: ${{ secrets.GMAIL_REDIRECT_URI }}
          EMAIL_TOKEN_ENCRYPTION_KEY: ${{ secrets.EMAIL_TOKEN_ENCRYPTION_KEY }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Smart Inbox Job Tracker backend" \
            --parameters commands="[
              \"set -e\",
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY\",
              \"docker pull $ECR_REGISTRY/job-tracker-backend:latest\",
              \"docker run --rm -e DATABASE_URL='$DATABASE_URL' -e ENVIRONMENT=production -e DEBUG=False -e SECRET_KEY='$SECRET_KEY' -e FRONTEND_URL='$FRONTEND_URL' -e GMAIL_CLIENT_ID='$GMAIL_CLIENT_ID' -e GMAIL_CLIENT_SECRET='$GMAIL_CLIENT_SECRET' -e GMAIL_REDIRECT_URI='$GMAIL_REDIRECT_URI' -e EMAIL_TOKEN_ENCRYPTION_KEY='$EMAIL_TOKEN_ENCRYPTION_KEY' $ECR_REGISTRY/job-tracker-backend:latest alembic upgrade head\",
              \"docker stop job-tracker-backend || true\",
              \"docker rm job-tracker-backend || true\",
              \"docker run -d --name job-tracker-backend --restart unless-stopped -p 80:8000 -e DATABASE_URL='$DATABASE_URL' -e ENVIRONMENT=production -e DEBUG=False -e SECRET_KEY='$SECRET_KEY' -e ACCESS_TOKEN_EXPIRE_MINUTES=1440 -e ALLOWED_ORIGINS='$ALLOWED_ORIGINS' -e FRONTEND_URL='$FRONTEND_URL' -e GMAIL_CLIENT_ID='$GMAIL_CLIENT_ID' -e GMAIL_CLIENT_SECRET='$GMAIL_CLIENT_SECRET' -e GMAIL_REDIRECT_URI='$GMAIL_REDIRECT_URI' -e EMAIL_TOKEN_ENCRYPTION_KEY='$EMAIL_TOKEN_ENCRYPTION_KEY' $ECR_REGISTRY/job-tracker-backend:latest\",
              \"sleep 10\",
              \"curl -fsS http://localhost/api/health\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          set +e
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"
          WAIT_EXIT_CODE=$?
          set -e

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query "{Status:Status,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}" \
            --output json

          exit "$WAIT_EXIT_CODE"

      - name: Build frontend for CloudFront
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api
        run: |
          npm ci
          npm run build

      - name: Upload frontend to S3
        run: aws s3 sync frontend/dist "s3://${{ secrets.S3_BUCKET }}" --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
